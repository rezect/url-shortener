name: Basic CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Cloning repository
      uses: actions/checkout@v4

    - name: Installing Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Download modules
      run: go mod download

    - name: Compiling
      run: go build -v ./...

    - name: Running tests
      run: go test -v ./... -short